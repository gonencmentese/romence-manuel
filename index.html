<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Limba Română — Manual</title>
<meta name="description" content="Yetişkinler için Romence kursu A1·A2·B1." />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#2C3E63" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />

<style>
  :root{--paper:#FBF6EC;--ink:#2A2622;--red:#B5232A;--indigo:#2C3E63;--blue:#002B7F;
    --yellow:#E8B71F;--gold:#C8902F;--green:#5B8A4E;--soft:#EFE6D2;--line:#E2D6BC;--mute:#8A8175;
    --serif:Georgia,'Times New Roman',serif;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--paper);color:var(--ink);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overscroll-behavior-y:none;}
  body{padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px);}
  .wrap{max-width:760px;margin:0 auto;padding:14px 16px 40px;}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:16px;min-height:34px;}
  .back{font-family:var(--serif);font-size:15px;border:1px solid var(--line);background:#fff;
    color:var(--ink);border-radius:20px;padding:5px 14px;cursor:pointer;}
  .crumb{font-size:12.5px;color:var(--mute);}
  h1{font-family:var(--serif);font-size:26px;margin:0;font-weight:700;}
  .kicker{font-family:var(--serif);font-size:11px;letter-spacing:3px;color:var(--indigo);text-transform:uppercase;}
  .sub{font-size:12.5px;color:var(--mute);}
  .tricolor{display:flex;height:5px;border-radius:3px;overflow:hidden;max-width:120px;margin:6px 0 0;}
  .tricolor i{flex:1;}

  .levelcard{display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid var(--line);
    border-radius:10px;padding:16px;margin-bottom:12px;cursor:pointer;}
  .lvbadge{width:54px;height:54px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-size:20px;color:#fff;flex:0 0 auto;}
  .levelcard h2{font-family:var(--serif);font-size:19px;margin:0 0 2px;}
  .progmini{height:5px;background:var(--soft);border-radius:5px;margin-top:7px;overflow:hidden;}
  .progmini i{display:block;height:100%;background:var(--green);border-radius:5px;}

  .unit{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid var(--line);
    border-radius:9px;padding:13px 15px;margin-bottom:9px;cursor:pointer;}
  .unit.soon{opacity:.6;}
  .unum{font-family:var(--serif);font-size:17px;color:var(--indigo);width:30px;flex:0 0 auto;}
  .utitle{font-family:var(--serif);font-size:16px;}
  .utheme{font-size:12px;color:var(--mute);}
  .tag{font-size:11px;padding:3px 9px;border-radius:20px;margin-left:auto;flex:0 0 auto;}
  .tag.ok{background:#e7f0e3;color:var(--green);}
  .tag.soon{background:var(--soft);color:var(--mute);}

  .lesson{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--line);
    border-radius:9px;padding:13px 15px;margin-bottom:9px;cursor:pointer;}
  .lcheck{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;}
  .lcheck.on{background:var(--green);border-color:var(--green);}
  .ltitle{font-family:var(--serif);font-size:16px;}
  .lro{font-size:12px;color:var(--mute);}

  .block{margin-bottom:20px;}
  .btitle{font-family:var(--serif);font-size:18px;color:var(--indigo);margin:0 0 8px;}
  .btext{background:#fff;border:1.5px solid var(--line);border-radius:8px;padding:11px 14px;font-size:14px;line-height:1.5;}
  .panel{background:#fff;border:1.5px solid var(--line);border-radius:8px;overflow:hidden;}
  .vrow{display:flex;gap:10px;padding:9px 14px;border-top:1px solid var(--soft);}
  .vrow:first-child{border-top:none;}
  .vro{font-family:var(--serif);font-size:16px;color:var(--red);flex:0 0 46%;}
  .vtr{font-size:13.5px;flex:1;}
  table{width:100%;border-collapse:collapse;}
  th{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mute);text-align:left;padding:8px 14px;background:#faf6ec;font-weight:600;}
  td{padding:7px 14px;border-top:1px solid var(--soft);font-size:14.5px;}
  td.k{color:var(--mute);width:42%;}
  td.v{font-family:var(--serif);color:var(--red);}
  .note{background:#eef1f6;border-left:3px solid var(--indigo);padding:8px 12px;border-radius:3px;
    font-size:12.5px;color:#46506b;margin-top:8px;}

  .ex{background:#fff;border:1.5px solid var(--line);border-radius:8px;padding:14px;}
  .exinstr{font-size:12.5px;color:var(--mute);margin-bottom:12px;}
  .exq{margin-bottom:13px;}
  .exprompt{font-family:var(--serif);font-size:16px;line-height:1.7;}
  .fillin{font-family:var(--serif);font-size:15px;border:none;border-bottom:2px solid var(--indigo);
    background:#f7f3ea;width:120px;padding:2px 6px;text-align:center;color:var(--ink);}
  .fillin.ok{border-color:var(--green);background:#e7f0e3;}
  .fillin.no{border-color:var(--red);background:#f6e3e3;}
  .sol{font-size:12px;color:var(--green);margin-left:8px;}
  .exopts{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .exopt{font-family:var(--serif);font-size:15px;padding:8px 16px;border:1.5px solid var(--line);
    background:#fff;border-radius:6px;cursor:pointer;}
  .exopt.ok{background:#e7f0e3;border-color:var(--green);color:#3f6a34;}
  .exopt.no{background:#f6e3e3;border-color:var(--red);color:var(--red);}
  .checkbtn{font-family:var(--serif);font-size:14px;background:var(--indigo);color:#fff;border:none;
    border-radius:6px;padding:8px 16px;cursor:pointer;margin-top:6px;}
  .donebtn{display:block;width:100%;font-family:var(--serif);font-size:16px;padding:13px;border-radius:8px;
    border:1.5px solid var(--green);background:#fff;color:var(--green);cursor:pointer;margin-top:8px;}
  .donebtn.on{background:var(--green);color:#fff;}

  #install{position:fixed;right:14px;bottom:18px;z-index:30;display:none;background:var(--indigo);color:#fff;
    border:none;border-radius:24px;padding:11px 18px;font-family:var(--serif);font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.18);cursor:pointer;}
  .search{width:100%;box-sizing:border-box;padding:11px 14px;border:1.5px solid var(--line);border-radius:8px;
    font-size:15px;background:#fff;font-family:var(--serif);margin-bottom:12px;}
  .search:focus{outline:none;border-color:var(--indigo);}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .chip{font-size:12.5px;padding:6px 12px;border:1.5px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;}
  .chip.on{background:var(--indigo);color:#fff;border-color:var(--indigo);}
  .sectlabel{font-family:var(--serif);font-size:12px;letter-spacing:2px;color:var(--mute);text-transform:uppercase;margin:22px 0 10px;}
  .ctable td,.ctable th{font-size:11.5px;padding:6px 8px;}
  .ctable .k{white-space:nowrap;}
  .sent{display:flex;gap:10px;padding:8px 14px;border-top:1px solid var(--soft);}
  .sent:first-child{border-top:none;}
  .sro{font-family:var(--serif);color:var(--red);flex:0 0 50%;font-size:14px;}
  .str{font-size:13px;flex:1;}
  .svgwrap{text-align:center;margin:6px 0 16px;}
  .svgwrap svg{max-width:100%;height:auto;display:inline-block;border:1px solid var(--line);border-radius:10px;background:#fff;}
  .dialog{background:#fff;border:1px solid var(--line);border-left:4px solid var(--indigo);border-radius:8px;padding:13px 15px;font-size:14.5px;line-height:1.6;}
  .dialog b{color:var(--indigo);}
</style>
</head>
<body>
  <div id="app" class="wrap"></div>
  <button id="install">⬇ Uygulamayı yükle</button>

/* ---------- state + storage ---------- */
const S={view:"home",level:null,unit:null,lesson:null,done:new Set()};
function load(){try{S.done=new Set(JSON.parse(localStorage.getItem("manual:done")||"[]"));}catch(e){}}
function save(){try{localStorage.setItem("manual:done",JSON.stringify([...S.done]));}catch(e){}}
function lid(lv,u,i){return lv+"-"+u+"-"+i;}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function fold(s){return String(s).toLocaleLowerCase("tr").trim()
  .replace(/ă|â/g,"a").replace(/î/g,"i").replace(/ș|ş/g,"s").replace(/ț|ţ/g,"t");}
function levelStats(lv){let total=0,done=0;COURSE[lv].units.forEach(u=>{if(u.lessons){total+=u.lessons.length;
  u.lessons.forEach((_,i)=>{if(S.done.has(lid(lv,u.n,i)))done++;});}});return{total,done};}

      <div class="lvbadge" style="background:${c.badge}">${lv}</div>

        <h2>${c.label}</h2>

function vUnits(){
  const lv=S.level,c=COURSE[lv];
  const list=c.units.map(u=>{
    if(!u.lessons){
      return `<div class="unit soon"><div class="unum">${u.n}</div>
        <div><div class="utitle">${esc(u.ro)}</div><div class="utheme">${esc(u.tr)}</div></div>
        <span class="tag soon">Hazırlanıyor</span></div>`;
    }
    let done=0;u.lessons.forEach((_,i)=>{if(S.done.has(lid(lv,u.n,i)))done++;});
    return `<div class="unit" data-act="unit" data-val="${u.n}"><div class="unum">${u.n}</div>
      <div><div class="utitle">${esc(u.ro)}</div><div class="utheme">${esc(u.tr)}</div></div>
      <span class="tag ok">${done}/${u.lessons.length} ✓</span></div>`;
  }).join("");
  return topBar(c.label,"Üniteler")+list;
}
function vUnit(){
  const lv=S.level,u=COURSE[lv].units.find(x=>x.n===S.unit);
  const list=u.lessons.map((l,i)=>{
    const done=S.done.has(lid(lv,u.n,i));
    return `<div class="lesson" data-act="lesson" data-val="${i}">
      <div class="lcheck ${done?"on":""}">${done?"✓":""}</div>
      <div><div class="ltitle">${i+1}. ${esc(l.title)}</div><div class="lro">${esc(l.ro)}</div></div>
      <div style="margin-left:auto;color:var(--mute)">›</div></div>`;
  }).join("");
  return topBar(`${lv} · Ünite ${u.n}`,esc(u.ro))+list;
}
function vLesson(){
  const lv=S.level,u=COURSE[lv].units.find(x=>x.n===S.unit),l=u.lessons[S.lesson];
  const id=lid(lv,u.n,S.lesson);const done=S.done.has(id);
  const body=l.blocks.map((b,bi)=>renderBlock(b,id+":"+bi)).join("");
  return topBar(`${lv} · Ü${u.n} · Ders ${S.lesson+1}`,esc(l.title))+body+genQuizHTML(l)+
    `<button class="donebtn ${done?"on":""}" data-act="toggledone">${done?"✓ Tamamlandı":"Dersi tamamla"}</button>`;
}
function topBar(crumb,title){
  return `<div class="top"><button class="back" data-act="back">‹ Geri</button>
    <div><div class="crumb">${crumb}</div></div></div>
    <h1 style="margin-bottom:14px">${title}</h1>`;
}

function renderBlock(b,exId){
  if(b.t==="text")return `<div class="block"><div class="btext">${esc(b.body).replace(/\n/g,"<br>")}</div></div>`;
  if(b.t==="svg")return `<div class="block svgwrap">${b.svg}</div>`;
  if(b.t==="read")return `<div class="block"><div class="dialog">${b.body}</div></div>`;
  if(b.t==="note_block")return `<div class="block"><div class="note">${esc(b.body)}</div></div>`;
  if(b.t==="vocab"){
    const rows=b.items.map(it=>`<div class="vrow"><span class="vro">${esc(it[0])}</span><span class="vtr">${esc(it[1])}</span></div>`).join("");
    return `<div class="block"><div class="btitle">${esc(b.title)}</div><div class="panel">${rows}</div></div>`;
  }
  if(b.t==="table"){
    const th=`<tr>${b.head.map(h=>`<th>${esc(h)}</th>`).join("")}</tr>`;
    const tr=b.rows.map(r=>`<tr>${r.map((c,i)=>`<td class="${i===0?"k":"v"}">${esc(c)}</td>`).join("")}</tr>`).join("");
    const note=b.note?`<div class="note">${esc(b.note)}</div>`:"";
    return `<div class="block"><div class="btitle">${esc(b.title)}</div><div class="panel"><table>${th}${tr}</table></div>${note}</div>`;
  }
  if(b.t==="ex_fill"){
    const qs=b.qs.map(q=>{
      const inp=`<input class="fillin" data-answer="${esc(q[1])}" autocapitalize="off" autocomplete="off" spellcheck="false"><span class="sol"></span>`;
      return `<div class="exq"><span class="exprompt">${esc(q[0]).replace("___",inp)}</span></div>`;
    }).join("");
    return `<div class="block"><div class="btitle">${esc(b.title)}</div>
      <div class="ex" id="ex-${esc(exId)}"><div class="exinstr">${esc(b.instr)}</div>${qs}
      <button class="checkbtn" data-act="checkfill" data-ex="${esc(exId)}">Kontrol et</button></div></div>`;
  }
  if(b.t==="ex_choice"){
    const qs=b.qs.map(q=>{
      const opts=q[1].map((o,oi)=>`<button class="exopt" data-act="choice" data-correct="${oi===q[2]?1:0}">${esc(o)}</button>`).join("");
      return `<div class="exq"><div class="exprompt">${esc(q[0])}</div><div class="exopts">${opts}</div></div>`;
    }).join("");
    return `<div class="block"><div class="btitle">${esc(b.title)}</div>
      <div class="ex"><div class="exinstr">${esc(b.instr)}</div>${qs}</div></div>`;
  }
  if(b.t==="ex_tf"){
    const qs=b.qs.map(q=>{
      const opts=[["Adevărat",true],["Fals",false]].map(o=>
        `<button class="exopt" data-act="choice" data-correct="${o[1]===q[1]?1:0}">${o[0]}</button>`).join("");
      return `<div class="exq"><div class="exprompt">${esc(q[0])}</div><div class="exopts">${opts}</div></div>`;
    }).join("");
    return `<div class="block"><div class="btitle">${esc(b.title)}</div>
      <div class="ex"><div class="exinstr">${esc(b.instr)}</div>${qs}</div></div>`;
  }
  return "";
}

   sentences:[["Mă trezesc devreme.","Erken uyanırım."],["Îmi amintesc de tine.","Seni hatırlıyorum."],["Mi-am dorit asta de mult.","Bunu çoktandır istiyordum."],["Ne distrăm împreună.","Birlikte eğleniyoruz."],["Își imaginează totul.","Her şeyi hayal ediyor."]]},
];
const ARTICLES={
  intro:"Romence’de belirli artikel (İng. “the”) kelimenin SONUNA eklenir — bir ek gibi. Cinsiyete ve sayıya göre değişir. Türkçede tam karşılığı yoktur; belirlilik (“o / söz konusu”) anlamı katar.",
  groups:[
    {title:"Eril & Nötr — tekil",rule:"Ünsüzle bitenlere -ul; -e ile bitenlere -le.",rows:[["băiat","băiatul","çocuk"],["tren","trenul","tren"],["om","omul","adam / insan"],["câine","câinele","köpek"],["frate","fratele","erkek kardeş"],["pește","peștele","balık"]]},
    {title:"Dişil — tekil",rule:"-ă → -a; -e → -ea; -a → -ua.",rows:[["casă","casa","ev"],["fată","fata","kız"],["floare","floarea","çiçek"],["carte","cartea","kitap"],["cafea","cafeaua","kahve"],["cutie","cutia","kutu"]]},
    {title:"Çoğul",rule:"Eril çoğul -i uzar: băieți → băieții. Dişil/nötr çoğul → -le.",rows:[["băieți","băieții","çocuklar"],["studenți","studenții","öğrenciler"],["case","casele","evler"],["cărți","cărțile","kitaplar"],["flori","florile","çiçekler"],["trenuri","trenurile","trenler"]]},
  ],
  examples:[["Cartea este pe masă.","Kitap masanın üstünde."],["Unde este băiatul?","Çocuk nerede?"],["Îmi place cafeaua.","Kahveyi severim."],["Câinele doarme.","Köpek uyuyor."],["Florile sunt frumoase.","Çiçekler güzel."],["Am închis ușa.","Kapıyı kapattım."]],
  note:"Karşılaştır: belirsiz artikel (un / o) kelimenin ÖNÜNE gelir → un băiat (bir çocuk), o casă (bir ev). Belirli artikel ise hep sona eklenir → băiatul, casa.",
};
const TOOLS=[
  ["dict","Sözlük","📖","var(--green)","Tüm kelimeler · ara"],
  ["conj","Çekimler","🔄","var(--indigo)","30+ fiil · 3 zaman"],
  ["pron","Zamirler","👥","var(--red)","Akuzatif · Datif · Refleksif"],
  ["gram","Gramer","📐","var(--gold)","Belirli artikel"],
  ["quiz","Sınav","🎯","var(--blue)","Karışık kelime testi"],
];

/* ============ SIK KULLANILANLAR — ekranlar ============ */
function buildDict(){
  if(S._dict)return S._dict;
  const seen=new Set(),out=[];
  for(const lv of LEVELS) for(const u of COURSE[lv].units){ if(!u.lessons)continue;
    for(const l of u.lessons) for(const b of l.blocks) if(b.t==="vocab") for(const it of b.items){
      if(seen.has(it[0]))continue; seen.add(it[0]); out.push([it[0],it[1]]); } }
  for(const v of VERBS){ if(seen.has(v.inf))continue; seen.add(v.inf); out.push([v.inf,v.tr]); }
  out.sort((a,b)=>a[0].localeCompare(b[0],"ro"));
  S._dict=out;return out;
}
function dictRows(){
  const q=fold(S.dictQ||"");
  let list=buildDict();
  if(q)list=list.filter(p=>fold(p[0]).includes(q)||fold(p[1]).includes(q));
  const n=list.length; list=list.slice(0,400);
  if(!n)return `<div class="sub" style="padding:14px">Sonuç yok.</div>`;
  return list.map(p=>`<div class="vrow"><span class="vro">${esc(p[0])}</span><span class="vtr">${esc(p[1])}</span></div>`).join("");
}
function toolTop(t){return `<div class="top"><button class="back" data-act="toolback">‹ Geri</button><div class="crumb">Sık kullanılanlar</div></div><h1 style="margin-bottom:12px">${t}</h1>`;}
function vDict(){
  return toolTop("Sözlük 📖")+
    `<input class="search" id="dictsearch" placeholder="Romence veya Türkçe ara…" value="${esc(S.dictQ||"")}" autocapitalize="off" autocomplete="off" spellcheck="false">
    <div class="panel" id="dictresults">${dictRows()}</div>`;
}
function vConj(){
  const g=S.conjGroup||VERB_GROUPS[0][0];
  const chips=VERB_GROUPS.map(gr=>`<div class="chip ${gr[0]===g?"on":""}" data-act="conjgroup" data-val="${gr[0]}">${esc(gr[1])}</div>`).join("");
  const cards=VERBS.filter(v=>v.group===g).map(v=>{
    const head=`<tr><th>Kişi</th>${TENSES.map(t=>`<th>${esc(t[2])}</th>`).join("")}</tr>`;
    const rows=PERSONS.map((p,i)=>`<tr><td class="k">${esc(p)}</td>${TENSES.map(t=>`<td class="v">${esc(verbForms(v,t[0])[i])}</td>`).join("")}</tr>`).join("");
    return `<div class="block"><div class="btitle">${esc(v.inf)} <span class="sub">— ${esc(v.tr)}</span></div>
      <div class="panel ctable"><table>${head}${rows}</table></div></div>`;
  }).join("");
  return toolTop("Çekimler 🔄")+`<div class="chips">${chips}</div>${cards}`;
}
function vPron(){
  const secs=CLITICS.map(c=>{
    const t1=`<table><tr><th>Kişi</th><th>Zamir</th><th>Anlam</th></tr>${c.table.map(r=>`<tr><td class="k">${esc(r[0])}</td><td class="v">${esc(r[1])}</td><td class="v">${esc(r[2])}</td></tr>`).join("")}</table>`;
    const exHead=`<tr>${c.exCols.map(h=>`<th>${esc(h)}</th>`).join("")}</tr>`;
    const exRows=c.rows.map(r=>`<tr>${r.map((cell,i)=>`<td class="${i===0?"k":"v"}">${esc(cell)}</td>`).join("")}</tr>`).join("");
    const sents=c.sentences.map(s=>`<div class="sent"><span class="sro">${esc(s[0])}</span><span class="str">${esc(s[1])}</span></div>`).join("");
    return `<div class="block"><div class="btitle">${esc(c.title)}</div><div class="sub" style="margin:-4px 0 8px">${esc(c.sub)}</div>
      <div class="panel ctable">${t1}</div><div class="note">${esc(c.note)}</div>
      <div class="sectlabel">${esc(c.exTitle)}</div><div class="panel ctable"><table>${exHead}${exRows}</table></div>
      <div class="sectlabel">Örnek cümleler</div><div class="panel">${sents}</div></div>`;
  }).join("");
  return toolTop("Zamirler 👥")+secs;
}
function vGram(){
  const groups=ARTICLES.groups.map(g=>{
    const rows=g.rows.map(r=>`<tr><td class="k">${esc(r[0])}</td><td class="v">${esc(r[1])}</td><td class="v">${esc(r[2])}</td></tr>`).join("");
    return `<div class="block"><div class="btitle">${esc(g.title)}</div><div class="sub" style="margin:-4px 0 8px">${esc(g.rule)}</div>
      <div class="panel ctable"><table><tr><th>Yalın</th><th>Artikelli</th><th>Anlam</th></tr>${rows}</table></div></div>`;
  }).join("");
  const ex=ARTICLES.examples.map(e=>`<div class="sent"><span class="sro">${esc(e[0])}</span><span class="str">${esc(e[1])}</span></div>`).join("");
  return toolTop("Belirli Artikel 📐")+`<div class="note">${esc(ARTICLES.intro)}</div>${groups}
    <div class="sectlabel">Örnekler</div><div class="panel">${ex}</div>
    <div class="note" style="margin-top:12px">${esc(ARTICLES.note)}</div>`;
}
function makeQuizQ(){
  const d=buildDict(); if(d.length<4)return null;
  const ans=shuf(d)[0],ro2tr=Math.random()<0.5;
  const prompt=ro2tr?ans[0]:ans[1],correct=ro2tr?ans[1]:ans[0];
  const pool=d.map(p=>ro2tr?p[1]:p[0]),dis=[],seen=new Set([correct]);
  for(const v of shuf(pool)){ if(seen.has(v))continue; seen.add(v); dis.push(v); if(dis.length>=3)break; }
  return {prompt,correct,options:shuf([correct].concat(dis)),dir:ro2tr};
}
function vQuiz(){
  if(!S.quiz||!S.quiz.q)S.quiz={q:makeQuizQ(),score:0,total:0};
  const q=S.quiz.q;
  const opts=q.options.map(o=>`<button class="exopt" data-act="quizpick" data-correct="${o===q.correct?1:0}">${esc(o)}</button>`).join("");
  return toolTop("Sınav 🎯")+
    `<p class="sub" style="margin:-6px 0 14px">Skor: <b id="quizscore">${S.quiz.score} / ${S.quiz.total}</b> · ${q.dir?"Romence → Türkçe":"Türkçe → Romence"}</p>
    <div class="ex"><div class="exprompt" style="font-size:24px;color:var(--red);margin-bottom:10px">${esc(q.prompt)}</div>
      <div class="exopts">${opts}</div></div>
    <button class="donebtn" style="margin-top:18px;color:var(--indigo);border-color:var(--indigo)" data-act="quiznext">Sonraki soru ›</button>`;
}

/* ============ AUTO QUIZ (her derste kelime testi) ============ */
let _GV=null;
function globalVocab(){
  if(_GV)return _GV;
  const ro=[],tr=[],sro=new Set(),str=new Set();
  for(const lv of LEVELS) for(const u of COURSE[lv].units){ if(!u.lessons)continue;
    for(const l of u.lessons) for(const b of l.blocks) if(b.t==="vocab") for(const it of b.items){
      if(!sro.has(it[0])){sro.add(it[0]);ro.push(it[0]);}
      if(!str.has(it[1])){str.add(it[1]);tr.push(it[1]);}
    }
  }
  _GV={ro,tr};return _GV;
}
function shuf(a){const x=a.slice();for(let i=x.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[x[i],x[j]]=[x[j],x[i]];}return x;}
function lessonPairs(l){
  const seen=new Set(),out=[];
  for(const b of l.blocks) if(b.t==="vocab") for(const it of b.items){ if(seen.has(it[0]))continue; seen.add(it[0]); out.push([it[0],it[1]]); }
  return out;
}
function distractors(correct,localPool,globalPool){
  const cands=[],seen=new Set([correct]);
  for(const v of localPool){ if(seen.has(v))continue; seen.add(v); cands.push(v); }
  for(const v of shuf(globalPool)){ if(seen.has(v))continue; seen.add(v); cands.push(v); if(cands.length>=14)break; }
  return shuf(cands).slice(0,3);
}
function genQuizHTML(l){
  const pairs=lessonPairs(l);
  if(pairs.length<2)return "";
  const GV=globalVocab();
  const n=Math.min(6,pairs.length);
  const chosen=shuf(pairs).slice(0,n);
  const localTr=pairs.map(p=>p[1]),localRo=pairs.map(p=>p[0]);
  const qs=chosen.map(p=>{
    const ro2tr=Math.random()<0.5;
    let prompt,correct,dis;
    if(ro2tr){prompt=p[0];correct=p[1];dis=distractors(correct,localTr,GV.tr);}
    else{prompt=p[1];correct=p[0];dis=distractors(correct,localRo,GV.ro);}
    if(dis.length<3)return "";
    const opts=shuf([correct].concat(dis));
    const ob=opts.map(o=>`<button class="exopt" data-act="choice" data-correct="${o===correct?1:0}">${esc(o)}</button>`).join("");
    return `<div class="exq"><div class="exprompt">${esc(prompt)}</div><div class="exopts">${ob}</div></div>`;
  }).filter(Boolean).join("");
  if(!qs)return "";
  return `<div class="block"><div class="btitle">Kelime testi 🎲</div>
    <div class="ex"><div class="exinstr">Doğru karşılığı seç · her açılışta yenilenir</div>${qs}</div></div>`;
}

/* ============ REVIEW (ders bitince tekrar) ============ */
function completedVocab(){
  const pairs=[];
  for(const lv of LEVELS) for(const u of COURSE[lv].units){ if(!u.lessons)continue;
    u.lessons.forEach((l,i)=>{ if(!S.done.has(lid(lv,u.n,i)))return;
      for(const b of l.blocks) if(b.t==="vocab") for(const it of b.items) pairs.push({ro:it[0],tr:it[1]});
    });
  }
  const seen=new Set(),out=[];
  for(const p of pairs){ if(seen.has(p.ro))continue; seen.add(p.ro); out.push(p); }
  return out;
}
function makeReviewQ(){
  const pool=completedVocab();
  const trs=[...new Set(pool.map(p=>p.tr))];
  if(pool.length<4||trs.length<4)return null;
  const sh=a=>{const x=a.slice();for(let i=x.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[x[i],x[j]]=[x[j],x[i]];}return x;};
  const ans=sh(pool)[0];
  const dis=sh(trs.filter(t=>t!==ans.tr)).slice(0,3);
  return {ro:ans.ro,tr:ans.tr,options:sh([ans.tr].concat(dis))};
}
function vReview(){
  const r=S.review;
  const opts=r.options.map(o=>`<button class="exopt" data-act="choice" data-correct="${o===r.tr?1:0}">${esc(o)}</button>`).join("");
  return `<div class="top"><button class="back" data-act="revdone">‹ Geç</button><div class="crumb">Hızlı tekrar</div></div>
    <h1 style="margin-bottom:6px">Tekrar 📝</h1>
    <p class="sub" style="margin-bottom:16px">Önceki derslerden bir kelime — anlamı ne?</p>
    <div class="ex" style="margin-bottom:14px"><div class="exinstr">Bu Romence kelimenin anlamı?</div>
      <div class="exprompt" style="font-size:24px;color:var(--red)">${esc(r.ro)}</div></div>
    <div class="exopts" style="display:grid;gap:10px">${opts}</div>
    <button class="donebtn" style="margin-top:18px;color:var(--indigo);border-color:var(--indigo)" data-act="revdone">Devam ›</button>`;
}

/* ============ RENDER ============ */
function render(){
  let html;
  switch(S.view){case"home":html=vHome();break;case"units":html=vUnits();break;
    case"unit":html=vUnit();break;case"lesson":html=vLesson();break;case"review":html=vReview();break;
    case"dict":html=vDict();break;case"conj":html=vConj();break;case"pron":html=vPron();break;
    case"gram":html=vGram();break;case"quiz":html=vQuiz();break;}
  const app=document.getElementById("app");app.innerHTML=html;app.scrollTo?app.scrollTo(0,0):0;window.scrollTo(0,0);
}

/* ============ ACTIONS ============ */
document.addEventListener("click",e=>{
  const t=e.target.closest("[data-act]");if(!t)return;
  const act=t.getAttribute("data-act"),val=t.getAttribute("data-val");
  // exercise interactions (no full re-render)
  if(act==="choice"){
    const box=t.parentElement;if(box.dataset.locked)return;box.dataset.locked="1";
    box.querySelectorAll(".exopt").forEach(o=>{
      if(o.getAttribute("data-correct")==="1")o.classList.add("ok");});
    if(t.getAttribute("data-correct")!=="1")t.classList.add("no");
    return;
  }
  if(act==="quizpick"){
    const box=t.parentElement;if(box.dataset.locked)return;box.dataset.locked="1";
    box.querySelectorAll(".exopt").forEach(o=>{if(o.getAttribute("data-correct")==="1")o.classList.add("ok");});
    if(t.getAttribute("data-correct")!=="1")t.classList.add("no");
    if(S.quiz){S.quiz.total++;if(t.getAttribute("data-correct")==="1")S.quiz.score++;
      const sc=document.getElementById("quizscore");if(sc)sc.textContent=S.quiz.score+" / "+S.quiz.total;}
    return;
  }
  if(act==="checkfill"){
    const box=document.getElementById("ex-"+t.getAttribute("data-ex"));
    if(!box)return;
    box.querySelectorAll("input.fillin").forEach(inp=>{
      const ok=fold(inp.value)===fold(inp.getAttribute("data-answer"));
      inp.classList.remove("ok","no");inp.classList.add(ok?"ok":"no");
      const sol=inp.nextElementSibling;
      if(sol&&sol.classList.contains("sol")){sol.textContent=ok?"✓":("→ "+inp.getAttribute("data-answer"));
        sol.style.color=ok?"var(--green)":"var(--red)";}
    });
    return;
  }
  // navigation / state
  switch(act){
    case"level":S.level=val;S.view="units";break;
    case"tool":
      if(val==="quiz")S.quiz=null;
      if(val==="conj"&&!S.conjGroup)S.conjGroup=VERB_GROUPS[0][0];
      if(val==="dict")S.dictQ="";
      S.view=val;break;
    case"toolback":S.view="home";break;
    case"conjgroup":S.conjGroup=val;break;
    case"quiznext":S.quiz={q:makeQuizQ(),score:(S.quiz?S.quiz.score:0),total:(S.quiz?S.quiz.total:0)};break;
    case"unit":S.unit=+val;S.view="unit";break;
    case"lesson":S.lesson=+val;S.view="lesson";break;
    case"toggledone":{const id=lid(S.level,S.unit,S.lesson);S.done.has(id)?S.done.delete(id):S.done.add(id);save();break;}
    case"revdone":S.review=null;S.view="unit";break;
    case"back":
      if(S.view==="lesson"){
        const curDone=S.done.has(lid(S.level,S.unit,S.lesson));
        const rq=curDone?makeReviewQ():null;
        if(rq){S.review=rq;S.view="review";}
        else S.view="unit";
      }
      else if(S.view==="review")S.view="unit";
      else if(S.view==="unit")S.view="units";
      else if(S.view==="units")S.view="home";
      break;
    default:return;
  }
  render();
});
document.addEventListener("input",e=>{
  if(e.target&&e.target.id==="dictsearch"){
    S.dictQ=e.target.value;
    const r=document.getElementById("dictresults");if(r)r.innerHTML=dictRows();
  }
});

/* ============ PWA ============ */
let dp=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dp=e;
  const b=document.getElementById("install");b.style.display="block";
  b.onclick=async()=>{b.style.display="none";dp.prompt();await dp.userChoice;dp=null;};});
window.addEventListener("appinstalled",()=>{document.getElementById("install").style.display="none";});
if("serviceWorker"in navigator&&location.protocol.startsWith("http")){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}

/* ============ INIT ============ */
load();render();
</script>
